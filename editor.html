<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: Arial;
  padding: 15px;
}

select, button {
  width: 100%;
  font-size: 18px;
  padding: 15px;
  margin: 8px 0;
}

textarea {
  width: 100%;
  height: 300px;
  font-size: 16px;
}
</style>
</head>
<body>

<h2>🎤 Editor</h2>

<select id="songSelect"></select>
<button onclick="loadSong()">📂 Laden</button>
<button onclick="newSong()">➕ Nieuw Lied</button>

<textarea id="input"></textarea>

<button onclick="save()">💾 Opslaan</button>
<button onclick="deleteSong()">🗑️ Verwijderen</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD-fBAqPUqDe22lmbJXyPEVix-LgMYrBT0",
  authDomain: "lyrics-a63b8.firebaseapp.com",
  databaseURL: "https://lyrics-a63b8-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "lyrics-a63b8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const select = document.getElementById("songSelect");

db.ref("songs").on("value", snap => {
  const songs = snap.val() || {};
  select.innerHTML = "";
  Object.keys(songs).forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.text = name;
    select.appendChild(opt);
  });
});

function parse(raw) {
  return raw.trim().split("\n").map(line => {
    const [line1, line2] = line.split("|");
    return {
      line1: line1.trim(),
      line2: line2 ? line2.trim() : ""
    };
  });
}

function loadSong() {
  const name = select.value;
  db.ref("songs/" + name).once("value", snap => {
    const lyrics = snap.val() || [];
    document.getElementById("input").value =
      lyrics.map(l => l.line1 + " | " + l.line2).join("\n");
  });
}

// 🔥 FIXED newSong
function newSong() {
  const name = prompt("Naam lied:");
  if (!name) return;

  db.ref("songs/" + name).set([
    { line1: "Nieuw lied", line2: "" }
  ]);

  setTimeout(() => {
    select.value = name;
    loadSong();
  }, 300);
}

function save() {
  const name = select.value;
  const raw = document.getElementById("input").value;
  db.ref("songs/" + name).set(parse(raw));
}

function deleteSong() {
  const name = select.value;
  db.ref("songs/" + name).remove();
}
</script>

</body>
</html>
