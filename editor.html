<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: Arial; padding: 20px; }
textarea {
  width: 100%;
  height: 300px;
  font-size: 16px;
}
button {
  padding: 15px;
  font-size: 18px;
  margin-top: 10px;
}
</style>
</head>
<body>

<h2>🎤 Lyrics Editor</h2>

<p>Gebruik formaat:</p>
<pre>
LINE | Vertaling
LINE | Vertaling
</pre>

<textarea id="input"></textarea>
<br>
<button onclick="save()">🚀 Start Show</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD-fBAqPUqDe22lmbJXyPEVix-LgMYrBT0",
  authDomain: "lyrics-a63b8.firebaseapp.com",
  databaseURL: "https://lyrics-a63b8-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "lyrics-a63b8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function save() {
  const raw = document.getElementById("input").value;

  const lyrics = raw.trim().split("\n").map(line => {
    const [line1, line2] = line.split("|");
    return {
      line1: line1.trim(),
      line2: line2 ? line2.trim() : ""
    };
  });

  db.ref("lyrics").set(lyrics);
  db.ref("index").set(0);

  alert("✅ Show gestart!");
}
</script>

</body>
</html>
