<!DOCTYPE html>
<html>
<body>

<h2>🎤 Lyrics Editor</h2>

<select id="songSelect"></select>
<br><br>

<textarea id="input" style="width:100%; height:200px;"></textarea>
<br>
<button onclick="save()">💾 Opslaan</button>
<button onclick="load()">📂 Laden</button>
<button onclick="start()">🚀 Start Lied</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD-fBAqPUqDe22lmbJXyPEVix-LgMYrBT0",
  authDomain: "lyrics-a63b8.firebaseapp.com",
  databaseURL: "https://lyrics-a63b8-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "lyrics-a63b8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const select = document.getElementById("songSelect");

db.ref("songs").on("value", snap => {
  const songs = snap.val() || {};
  select.innerHTML = "";
  Object.keys(songs).forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.text = name;
    select.appendChild(opt);
  });
});

function parseLyrics(raw) {
  return raw.trim().split("\n").map(line => {
    const [line1, line2] = line.split("|");
    return {
      line1: line1.trim(),
      line2: line2 ? line2.trim() : ""
    };
  });
}

function save() {
  const name = prompt("Naam lied?");
  const raw = document.getElementById("input").value;
  const lyrics = parseLyrics(raw);

  db.ref("songs/" + name).set(lyrics);
}

function load() {
  const name = select.value;
  db.ref("songs/" + name).once("value", snap => {
    const lyrics = snap.val() || [];
    document.getElementById("input").value =
      lyrics.map(l => l.line1 + " | " + l.line2).join("\n");
  });
}

function start() {
  const name = select.value;
  db.ref("songs/" + name).once("value", snap => {
    db.ref("lyrics").set(snap.val());
    db.ref("index").set(0);
  });
}
</script>

</body>
</html>
