<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: Arial;
  padding: 15px;
  text-align: center;
}

select, button {
  width: 100%;
  font-size: 20px;
  padding: 15px;
  margin: 10px 0;
}

.big-btn {
  font-size: 30px;
  padding: 25px;
}

.current {
  margin-top: 20px;
  font-size: 22px;
}
</style>
</head>
<body>

<h2>🎛️ Control</h2>

<select id="songSelect"></select>
<button onclick="startSong()">🎵 Start Lied</button>

<button class="big-btn" onclick="prev()">⬅️</button>
<button class="big-btn" onclick="next()">➡️</button>

<div class="current" id="current"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD-fBAqPUqDe22lmbJXyPEVix-LgMYrBT0",
  authDomain: "lyrics-a63b8.firebaseapp.com",
  databaseURL: "https://lyrics-a63b8-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "lyrics-a63b8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let lyrics = [];
let index = 0;

const select = document.getElementById("songSelect");

db.ref("songs").on("value", snap => {
  const songs = snap.val() || {};
  select.innerHTML = "";
  Object.keys(songs).forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.text = name;
    select.appendChild(opt);
  });
});

function startSong() {
  const name = select.value;
  db.ref("songs/" + name).once("value", snap => {
    db.ref("lyrics").set(snap.val());
    db.ref("index").set(0);
  });
}

db.ref("lyrics").on("value", snap => {
  lyrics = snap.val() || [];
});

db.ref("index").on("value", snap => {
  index = snap.val() || 0;
  if (lyrics[index]) {
    document.getElementById("current").innerText =
      lyrics[index].line1 + " / " + lyrics[index].line2;
  }
});

function next() {
  if (index < lyrics.length - 1) {
    db.ref("index").set(index + 1);
  }
}

function prev() {
  if (index > 0) {
    db.ref("index").set(index - 1);
  }
}
</script>

</body>
</html>
