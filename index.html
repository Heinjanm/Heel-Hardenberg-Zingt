<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  background: #000;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}
.container {
  text-align: center;
  padding: 20px;
  max-width: 900px;
}
.line1 {
  font-size: 7vw;
  font-weight: bold;
  margin-bottom: 20px;
}
.line2 {
  font-size: 4vw;
  color: #ffd54f;
}
</style>
</head>
<body>

<div class="container">
  <div id="line1" class="line1"></div>
  <div id="line2" class="line2"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD-fBAqPUqDe22lmbJXyPEVix-LgMYrBT0",
  authDomain: "lyrics-a63b8.firebaseapp.com",
  databaseURL: "https://lyrics-a63b8-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "lyrics-a63b8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const line1El = document.getElementById("line1");
const line2El = document.getElementById("line2");

db.ref("index").on("value", snap => {
  const i = snap.val();
  db.ref("lyrics/" + i).once("value", snap2 => {
    const data = snap2.val();
    if (!data) return;

    line1El.innerText = data.line1;
    line2El.innerText = data.line2;
  });
});
</script>

</body>
</html>
