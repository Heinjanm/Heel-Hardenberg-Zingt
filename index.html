<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  background: #000;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}
.container {
  text-align: center;
  width: 90%;
}
.line {
  font-size: 5vw;
  margin: 10px 0;
}
.active {
  color: #ffd54f;
  font-weight: bold;
}
</style>
</head>
<body>

<div class="container" id="lines"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD-fBAqPUqDe22lmbJXyPEVix-LgMYrBT0",
  authDomain: "lyrics-a63b8.firebaseapp.com",
  databaseURL: "https://lyrics-a63b8-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "lyrics-a63b8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const container = document.getElementById("lines");

db.ref().on("value", snap => {
  const data = snap.val();
  if (!data || !data.lyrics) return;

  const lyrics = data.lyrics;
  const index = data.index || 0;

  container.innerHTML = "";

  for (let i = index - 1; i < index + 3; i++) {
    if (i >= 0 && lyrics[i]) {
      const div = document.createElement("div");
      div.className = "line";
      if (i === index) div.classList.add("active");

      div.innerText = lyrics[i].line1 + " — " + lyrics[i].line2;
      container.appendChild(div);
    }
  }
});
</script>

</body>
</html>
